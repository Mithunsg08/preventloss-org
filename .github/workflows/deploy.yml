name: Deploy to GitHub Pages with IndexNow

on:
  push:
    branches:
      - main 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. This creates your secret text file dynamically at the root
      - name: Inject IndexNow Key File
        run: |
          echo "${{ secrets.INDEXNOW_KEY }}" > ${{ secrets.INDEXNOW_KEY }}.txt

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 2. AUTOMATIC INDEXING TRIGER (Runs right after successful deployment)
      - name: Automatically Submit to IndexNow
        uses: bojieyang/indexnow-action@v3
        with:
          sitemap-location: 'https://preventloss.org/sitemap.xml' # Change to your actual domain
          key: ${{ secrets.INDEXNOW_KEY }}
