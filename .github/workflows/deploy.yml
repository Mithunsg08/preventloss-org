name: Deploy to GitHub Pages with IndexNow

on:
  push:
    branches:
      - main # Change this to "master" if your default branch is master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This creates your secret text file dynamically at the root before deploying
      - name: Inject IndexNow Key File
        run: |
          echo "${{ secrets.INDEXNOW_KEY }}" > ${{ secrets.INDEXNOW_KEY }}.txt

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads your HTML root folder + the newly created key file

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
